<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .search-card { max-width: 400px; width: 100%; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 8px; background: white; }
        .card-header-custom { background-color: #0d6efd; color: white; margin: -20px -20px 20px -20px; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="search-card">
        <div class="card-header-custom">Check Your Result</div>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger text-center p-2" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/search" method="POST">
            <div class="mb-4">
                <label for="roll_no" class="form-label font-weight-bold">Enter Roll Number:</label>
                <input type="text" class="form-control form-control-lg" id="roll_no" name="roll_no" placeholder="e.g. 101" required autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Find Result</button>
        </form>
    </div>
</body>
</html>
