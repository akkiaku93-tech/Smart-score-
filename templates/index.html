<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm mt-5">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h3>Check Your Result</h3>
                    </div>
                    <div class="card-body p-4">
                        {% with messages = get_flashed_messages() %}
                          {% if messages %}
                            {% for message in messages %}
                              <div class="alert alert-danger">{{ message }}</div>
                            {% endfor %}
                          {% endif %}
                        {% endwith %}
                        
                        <form action="/search" method="POST">
                            <div class="mb-3">
                                <label for="roll_no" class="form-label">Enter Roll Number:</label>
                                <input type="text" class="form-control form-control-lg" id="roll_no" name="roll_no" placeholder="e.g. 101" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">Find Result</button>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <a href="/admin" class="text-muted text-decoration-none small">Teacher Login / Admin Panel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
